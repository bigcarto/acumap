<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AcuMap Pro — Catastro Edition</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --panel: rgba(20, 24, 33, 0.85);
  --panel-solid: #141821;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.5);
  --catastro: #ff4757;
  --text: #f8fafc;
  --muted: #94a3b8;
  --font: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

#app { display: flex; height: 100vh; }

/* Sidebar Moderna */
#sidebar {
  width: 400px;
  background: var(--panel-solid);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 1000;
  box-shadow: 20px 0 50px rgba(0,0,0,0.5);
}

#header {
  padding: 24px;
  background: linear-gradient(to bottom, rgba(59, 130, 246, 0.05), transparent);
}
.logo { font-family: var(--font-mono); font-weight: 700; font-size: 20px; color: var(--accent); letter-spacing: -1px; }
.logo span { color: var(--muted); font-weight: 400; }
.subtitle { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-top: 4px; }

/* Herramientas con estilo Card */
#tools {
  padding: 0 24px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.tool-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 600;
}
.tool-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); border-color: var(--accent); }
.tool-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
.tool-btn svg { width: 20px; height: 20px; }

/* Lista de Emisores */
#scroll-area { flex: 1; overflow-y: auto; padding: 20px 24px; }
.section-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  backdrop-filter: blur(10px);
}

/* Mapa y Resultados */
#map-container { flex: 1; position: relative; }
#map { height: 100%; width: 100%; background: #0d1117; }

#result-panel {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 280px;
  background: var(--panel);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  z-index: 1000;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.res-val { font-family: var(--font-mono); font-size: 42px; font-weight: 500; color: var(--accent); line-height: 1; }
.res-unit { font-size: 14px; color: var(--muted); margin-left: 4px; }

/* Botón flotante Catastro */
.catastro-fab {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: var(--catastro);
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  font-weight: 700;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
  border: none;
  transition: transform 0.2s;
}
.catastro-fab:hover { transform: translateX(-50%) scale(1.05); }

/* Rectángulo de selección */
#selection-rect {
  position: absolute;
  border: 2px solid var(--catastro);
  background: rgba(255, 71, 87, 0.1);
  pointer-events: none;
  display: none;
  z-index: 1001;
}

#loader {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(10,12,16,0.8);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 15px;
}
.spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--catastro); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <div id="header">
      <div class="logo">ACUMAP<span>PRO</span></div>
      <div class="subtitle">Simulador Acústico Catastral</div>
    </div>

    <div id="tools">
      <button class="tool-btn" id="btn-emitter">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Emisor
      </button>
      <button class="tool-btn" id="btn-receptor">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Receptor
      </button>
    </div>

    <div id="scroll-area">
      <div class="section-label">Configuración</div>
      <div class="card">
        <div style="font-size: 12px; color: var(--muted); margin-bottom: 8px;">Altura de análisis</div>
        <input type="range" min="1" max="50" value="2" style="width: 100%;">
      </div>
      
      <div class="section-label">Focos Activos</div>
      <div id="emitters-list">
        </div>
    </div>
  </aside>

  <main id="map-container">
    <div id="map"></div>
    
    <div id="result-panel">
      <div style="font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--muted); margin-bottom: 4px;">Nivel Total Recibido</div>
      <div class="res-val" id="total-db">--<span class="res-unit">dB(A)</span></div>
      <div style="margin-top: 15px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;">
        <div id="db-bar" style="height: 100%; background: var(--accent); width: 0%; transition: width 0.5s;"></div>
      </div>
    </div>

    <button class="catastro-fab" onclick="toggleCatastroMode()">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
      Descargar Edificios Catastro
    </button>

    <div id="selection-rect"></div>
    
    <div id="loader">
      <div class="spinner"></div>
      <div id="loader-text" style="font-size: 12px; font-family: var(--font-mono);">Consultando SEC...</div>
    </div>
  </main>
</div>

<script>
// --- CONFIGURACIÓN Y ESTADO ---
let map, receptorMarker;
let emitters = [];
let catastroMode = false;
let isDrawing = false;
let startPoint = null;

// Inicializar Mapa
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([40.4168, -3.7038], 18);
  
  // Capa base CartoDB Dark Matter
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Eventos de selección para Catastro
  map.on('mousedown', onMouseDown);
  map.on('mousemove', onMouseMove);
  map.on('mouseup', onMouseUp);
}

// --- LÓGICA CATASTRO (WFS INSPIRE) ---
function toggleCatastroMode() {
  catastroMode = !catastroMode;
  document.querySelector('.catastro-fab').style.background = catastroMode ? '#1e293b' : 'var(--catastro)';
  document.getElementById('map').style.cursor = catastroMode ? 'crosshair' : '';
  alert(catastroMode ? "Dibuja un rectángulo en el mapa para descargar los edificios." : "Modo descarga desactivado.");
}

function onMouseDown(e) {
  if (!catastroMode) return;
  isDrawing = true;
  startPoint = e.containerPoint;
  const rect = document.getElementById('selection-rect');
  rect.style.display = 'block';
  rect.style.left = startPoint.x + 'px';
  rect.style.top = startPoint.y + 'px';
  rect.style.width = '0px';
  rect.style.height = '0px';
  map.dragging.disable();
}

function onMouseMove(e) {
  if (!isDrawing) return;
  const rect = document.getElementById('selection-rect');
  const currentPoint = e.containerPoint;
  
  const left = Math.min(startPoint.x, currentPoint.x);
  const top = Math.min(startPoint.y, currentPoint.y);
  const width = Math.abs(startPoint.x - currentPoint.x);
  const height = Math.abs(startPoint.y - currentPoint.y);
  
  rect.style.left = left + 'px';
  rect.style.top = top + 'px';
  rect.style.width = width + 'px';
  rect.style.height = height + 'px';
}

async function onMouseUp(e) {
  if (!isDrawing) return;
  isDrawing = false;
  document.getElementById('selection-rect').style.display = 'none';
  map.dragging.enable();

  // Obtener coordenadas geográficas del rectángulo
  const endPoint = e.containerPoint;
  const southWest = map.containerPointToLatLng(L.point(Math.min(startPoint.x, endPoint.x), Math.max(startPoint.y, endPoint.y)));
  const northEast = map.containerPointToLatLng(L.point(Math.max(startPoint.x, endPoint.x), Math.min(startPoint.y, endPoint.y)));
  
  const bbox = `${southWest.lat},${southWest.lng},${northEast.lat},${northEast.lng}`;
  fetchCatastroData(bbox);
}

async function fetchCatastroData(bbox) {
  const loader = document.getElementById('loader');
  loader.style.display = 'flex';
  
  // URL del WFS del Catastro (formato INSPIRE)
  // Nota: Se pide en EPSG:4326 para compatibilidad directa
  const url = `https://ovc.catastro.meh.es/INSPIRE/wfsBU.aspx?service=wfs&version=2.0.0&request=getFeature&typeNames=bu:Building&bbox=${bbox},urn:ogc:def:crs:EPSG::4326&outputFormat=application/json`;

  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error("Error en el servicio del Catastro");
    const data = await response.json();
    
    processBuildings(data.features);
  } catch (err) {
    console.error(err);
    alert("Error al conectar con Catastro. Asegúrate de que el área sea en España y no demasiado grande.");
  } finally {
    loader.style.display = 'none';
    catastroMode = false;
  }
}

function processBuildings(features) {
  if (!features || features.length === 0) {
    alert("No se encontraron edificios en esta zona.");
    return;
  }

  // Limpiar capa anterior si existe
  if (window.buildingsLayer) map.removeLayer(window.buildingsLayer);

  window.buildingsLayer = L.geoJson(features, {
    style: {
      color: '#3b82f6',
      weight: 1,
      fillColor: '#3b82f6',
      fillOpacity: 0.3
    },
    onEachFeature: (feature, layer) => {
      // Cálculo de altura: Plantas * 3 metros (estándar Catastro)
      const plantas = feature.properties.numberOfFloorsAboveGround || 1;
      const altura = plantas * 3.0;
      
      layer.bindPopup(`
        <div style="font-family:Inter; font-size:12px; color:#1e293b">
          <b>Referencia Catastral:</b><br>${feature.id}<br><br>
          <b>Plantas:</b> ${plantas}<br>
          <b>Altura Estimada:</b> ${altura}m
        </div>
      `);
    }
  }).addTo(map);

  alert(`Descargados ${features.length} edificios del Catastro con datos de altura.`);
}

window.onload = initMap;
</script>
</body>
</html>
